spring:
  application:
    name: telemetry-processor-service
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: manual
  datasource:
    url: jdbc:postgresql://localhost:5432/telemetry
    username: telemetry
    password: telemetry
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: telemetry-processor-service

info:
  app:
    name: telemetry-processor-service
    description: Consumes telemetry events, processes them, persists data and handles retry/DLQ flow.

telemetry:
  dlq-service:
    base-url: http://localhost:8085
