spring:
  application:
    name: vehicle-telemetry-dashboard
  datasource:
    url: jdbc:postgresql://localhost:5432/telemetry
    username: telemetry
    password: telemetry
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  thymeleaf:
    cache: false

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: vehicle-telemetry-dashboard

info:
  app:
    name: vehicle-telemetry-dashboard
    description: Provides operational dashboard APIs for telemetry, alerts and DLQ visibility.

telemetry:
  dlq-service:
    base-url: http://localhost:8085
