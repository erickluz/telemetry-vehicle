spring:
  application:
    name: vehicle-ingestion-service
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: vehicle-ingestion-service

info:
  app:
    name: vehicle-ingestion-service
    description: Receives telemetry events over HTTP and publishes them to RabbitMQ.

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    displayOperationId: true
  show-actuator: false
  
openapi:
  info:
    title: Vehicle Ingestion Service API
    description: API para ingestão de dados de telemetria de veículos em tempo real
    version: 1.0.0
    contact:
      name: Telemetry Team
    license:
      name: Apache 2.0
